<style>
  html, body { margin:0; padding:0; background:#0B0A0F; }
  * { box-sizing: border-box; }
  body { font-family: Inter, sans-serif; color:#F3F0EA; }
  ::selection { background:#7C5CFF; color:#F3F0EA; }
  a { color: inherit; text-decoration: none; }
  img { display:block; max-width:100%; }
  @keyframes kingScrollLine {
    0%   { transform: translateY(-101%); }
    50%  { transform: translateY(0); }
    100% { transform: translateY(101%); }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes kingRise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Body block reveal — fade only, no Y movement */
  .king-reveal {
    opacity: 0;
    transition: opacity 450ms ease-out;
  }
  .king-reveal.in { opacity: 1; }

  /* Word reveal — tiny Y so stagger is invisible at medium speed */
  .king-word {
    display: inline-block;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 400ms ease-out, transform 400ms ease-out;
  }
  .king-word.in { opacity: 1; transform: translateY(0); }

  /* Section label */
  .king-section-label .sl-bar { transform: scaleX(0); transition: transform 350ms ease-out; }
  .king-section-label .sl-txt { opacity: 0; transition: opacity 350ms 60ms ease-out; display: inline-block; }
  .king-section-label.sl-in .sl-bar { transform: scaleX(1); }
  .king-section-label.sl-in .sl-txt { opacity: 1; }

  /* H2 block reveal */
  .king-h2-reveal { opacity: 0; transform: translateY(10px); transition: opacity 400ms ease-out, transform 400ms ease-out; }
  .king-h2-reveal.in { opacity: 1; transform: translateY(0); }

  /* Image reveal — fade only for smoothness */
  .king-img-reveal {
    opacity: 0;
    transition: opacity 600ms ease-out;
  }
  .king-img-reveal.in { opacity: 1; }

  /* Instantly snap all animations when scrolling fast */
  body.king-fast-scroll .king-reveal,
  body.king-fast-scroll .king-word,
  body.king-fast-scroll .king-h2-reveal,
  body.king-fast-scroll .king-img-reveal,
  body.king-fast-scroll .king-section-label .sl-bar,
  body.king-fast-scroll .king-section-label .sl-txt { transition-duration: 0ms !important; }

  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
  .lenis.lenis-stopped { overflow: clip; }

  /* ── Responsive layout ── */
  .king-nav { padding: 22px 44px; }
  .king-hero { padding: 0 44px; }
  .king-case-section { padding: 140px 60px; }
  .king-case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; margin-top: 40px; }
  .king-case-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 36px 48px; }
  .king-soren-top { padding: 120px 60px; max-width: 1100px; margin: 0 auto; }
  .king-soren-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 72px; align-items: center; }
  .king-soren-bottom { padding: 0 60px 120px; max-width: 1100px; margin: 0 auto; }
  .king-phone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .king-about-section { padding: 60px 60px 120px; }
  .king-about-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; align-items: center; }
  .king-services-section { padding: 120px 44px; }
  .king-services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; }
  .king-services-card { padding: 44px 32px; }
  .king-booking-section { padding: 140px 0; }
  .king-booking-inner { padding: 0 44px; }
  .king-footer { padding: 48px 44px 40px; }
  .king-footer-links { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  @media (max-width: 1023px) {
    .king-nav            { padding: 22px 24px; }
    .king-case-section   { padding: 100px 40px; }
    .king-case-grid      { gap: 48px; }
    .king-soren-top      { padding: 80px 40px; }
    .king-soren-grid     { grid-template-columns: 1fr 1fr; gap: 40px; }
    .king-soren-bottom   { padding: 0 40px 80px; }
    .king-phone-grid     { grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .king-about-section  { padding: 60px 40px 80px; }
    .king-about-grid     { grid-template-columns: 1fr 1.5fr; gap: 48px; }
    .king-services-section { padding: 80px 40px; }
    .king-booking-section  { padding: 100px 0; }
    .king-booking-inner    { padding: 0 40px; }
    .king-footer           { padding: 40px 40px 36px; }
  }

  @media (max-width: 767px) {
    .king-nav            { padding: 14px 20px; }
    .king-hero           { padding: 0 20px; }
    .king-case-section   { padding: 80px 20px; }
    .king-case-grid      { grid-template-columns: 1fr; gap: 40px; }
    .king-case-stats     { gap: 24px 32px; }
    .king-soren-top      { padding: 80px 20px; }
    .king-soren-grid     { grid-template-columns: 1fr; gap: 48px; }
    .king-soren-bottom   { padding: 0 20px 80px; }
    .king-phone-grid     { grid-template-columns: 1fr; }
    .king-about-section  { padding: 60px 20px 80px; }
    .king-about-grid     { grid-template-columns: 1fr; gap: 40px; }
    .king-services-section { padding: 80px 20px; }
    .king-services-grid  { grid-template-columns: 1fr; }
    .king-services-card  { padding: 32px 20px; }
    .king-booking-section  { padding: 80px 0; }
    .king-booking-inner    { padding: 0 20px; }
    .king-footer           { padding: 40px 20px 32px; }
    .king-footer-links     { align-items: flex-start; }
  }

  /* ── Focus-visible (accessibility) ── */
  *:focus { outline: none; }
  *:focus-visible { outline: 2px solid #7C5CFF; outline-offset: 3px; border-radius: 4px; }
</style>
